<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css-style/general.css" />
    <link rel="stylesheet" href="./css-style/header.css" />
    <link rel="stylesheet" href="./css-style/main.css" />
    <link rel="stylesheet" href="./css-style/basket.css"/>
    <script src="./js-scripts/scripts.js"></script>
    <script  src="./js-scripts/db.js"></script>
  </head>
  <body onload="init()">
    <header>
      <div class="header-img">
        <a href="" alt="Start site">
          <img
            src="./assets/png/Header-png.png"
            alt="BestellApp Picture"
            class="Header-png"
          />
        </a>
        <button class="menu-button">
          <img
            src="./assets/png/menu-button.png"
            alt="Menu Button"
            class="menu-button-img"
          />
        </button>
      </div>
    </header>
    <main>
      <section class="title-section">
        <img
          src="./assets/png/Title Background.png"
          alt="Main Background Picture with food"
          class="Title-Background"
        />
        <img
          src="./assets/png/Title Picture.png"
          alt="Burger Picture"
          class="title-picture"
        />
        <img
          src="./assets/png/Burger-House-Title.png"
          alt="Burger House Title with Reviews"
          class="burger-house-title"
        />
        <h1>The best of Burgers,Pizza and Green, all in one great place</h1>
      </section>
      <section class="burger-section">
        <header class="burger-header">
          <div class="burger-header-picture">
          <img
            src="./assets/png/burger-logo.png"
            alt="Burger Logo for the Burger Section"
          />
          </div>
          <h2 class="burger-h2">Burger & Sandwiches</h2>
        </header>
      </section>

      <div class="basket-active" id="basket-add-delete">
        <h4>Your Basket</h4>
        <div class="basket-empty">
        <p >Nothing there yet.<br>Go ahead and choose something <br>delicious!</p>
        <img src="./assets/png/basket.png" alt="empty Basket">
        </div>
      </div>
    
          <section class="burger-section">
        <header class="burger-header">
          <div class="burger-header-picture">
          <img
            src="./assets/png/Pizza-Logo.png"
            alt="Burger Logo for the Burger Section"
          />
          </div>
          <h2 class="burger-h2">Pizza (30cm)</h2>
        </header>
      </section>
       </section>
     
          <section class="burger-section">
        <header class="burger-header">
          <div class="burger-header-picture">
          <img
            src="./assets/png/Salad-logo.png"
            alt="Burger Logo for the Burger Section"
          />
          </div>
          <h2 class="burger-h2">Salad</h2>
        </header>
      </section>
     
      <div class="dialog-div">
        <dialog id="dialog">
          <div class="overlay">
            <div class="close-button">
              <button onclick=""><img src="./assets/png/close-x-button.png" alt="close dialog">
              </button>
            </div>
            <section class="dialog-section">
              <div class="order-dialog">
                <img src="./assets/png/delivery-car.png" alt="Delivery Car">
                <h2>Bestellung bestätigt!</h2>
                <p>Ihr Essen ist unterwegs!</p>
              </div>
            </section>
          </div>
        </dialog>
      </div>

    </main>
    <footer>
      Placeholder
    </footer>

    
  </body>
</html>
