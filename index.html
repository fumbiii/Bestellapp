<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css-style/general.css" />
    <link rel="stylesheet" href="./css-style/header.css" />
    <link rel="stylesheet" href="./css-style/main.css" />
    <script src="./js-scripts/basic.js"></script>
  </head>
  <body>
    <header>
      <div class="header-img">
        <a href="" alt="Start site">
          <img
            src="./png/Header-png.png"
            alt="BestellApp Picture"
            class="Header-png"
          />
        </a>
        <button class="menu-button">
          <img
            src="./png/menu-button.png"
            alt="Menu Button"
            class="menu-button-img"
          />
        </button>
      </div>
    </header>
    <main>
      <section class="title-section">
        <img
          src="./png/Title Background.png"
          alt="Main Background Picture with food"
          class="Title-Background"
        />
        <img
          src="./png/Title Picture.png"
          alt="Burger Picture"
          class="title-picture"
        />
        <img
          src="./png/Burger-House-Title.png"
          alt="Burger House Title with Reviews"
          class="burger-house-title"
        />
        <h1>The best of Burgers,Pizza and Green, all in one great place</h1>
      </section>
      <section class="burger-section">
        <header class="burger-header">
          <div class="burger-header-picture">
          <img
            src="./png/burger-logo.png"
            alt="Burger Logo for the Burger Section"
          />
          </div>
          <h2 class="burger-h2">Burger & Sandwiches</h2>
        </header>
        <main>
          <section class="food-offers">
            <div class="food-offers-picture">
            <img src="./png/Veggie-mushroom-black-burger.png" alt="Veggie-Mushroom Burger with black Buns">
            </div>
            <div class="food-offers-header-and-text">
              <h3>Veggie mushroom black Burger</h3>
              <p>Mixed green salad, Tomatoes, Edamame, Mushrooms</p>
            </div>
            <div class="food-offers-price-and-button">
              <p>16,90€</p>
              <button>Add to basket</button>
            </div>
          </section>
        </main>
      </section>
    </main>
  </body>
</html>
